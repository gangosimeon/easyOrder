<div class="auth-container">
  <div class="auth-card-wrapper">
    <mat-card class="auth-card">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-circle">
          <mat-icon class="logo-icon">lock_open</mat-icon>
        </div>
      </div>

      <!-- Header -->
      <div class="header-section">
        <h1 class="title">Mot de passe oublié ?</h1>
        <p class="subtitle">
          Entrez votre adresse email et nous vous enverrons un code pour réinitialiser votre mot de passe.
        </p>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Email Input -->
        <div class="form-field">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input
              matInput
              formControlName="email"
              type="email"
              placeholder="votre@email.com"
              autocomplete="email"
              required
            />
            <mat-icon matPrefix class="input-icon">email</mat-icon>
            <mat-error *ngIf="emailControl.touched && emailControl.invalid">
              {{ getEmailError() }}
            </mat-error>
          </mat-form-field>
        </div>

        <!-- Submit Button -->
        <button
          mat-flat-button
          type="submit"
          class="submit-btn"
          [disabled]="loading() || form.invalid"
          color="primary"
        >
          @if (loading()) {
            <mat-spinner diameter="20" class="spinner"></mat-spinner>
          } @else {
            <span>Envoyer le code</span>
          }
        </button>
      </form>

      <!-- Back to Login -->
      <div class="back-link">
        <a routerLink="/login" class="link">
          <mat-icon class="back-icon">arrow_back</mat-icon>
          Retour à la connexion
        </a>
      </div>
    </mat-card>
  </div>
</div>
