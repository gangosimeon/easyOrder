<div class="confirm-dialog">
  <div class="dialog-icon-wrap" [style.background]="(data.color ?? '#c62828') + '18'">
    <mat-icon [style.color]="data.color ?? '#c62828'">warning_amber</mat-icon>
  </div>

  <h2 class="dialog-title">{{ data.title }}</h2>
  <p class="dialog-message">{{ data.message }}</p>

  <div class="dialog-actions">
    <button mat-stroked-button class="btn-cancel" (click)="cancel()">
      <mat-icon>close</mat-icon> Annuler
    </button>
    <button mat-raised-button class="btn-confirm"
            [style.background]="data.color ?? '#c62828'"
            (click)="confirm()">
      <mat-icon>{{ data.icon ?? 'delete' }}</mat-icon>
      {{ data.confirmLabel ?? 'Confirmer' }}
    </button>
  </div>
</div>
