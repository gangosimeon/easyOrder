<!-- Sticky WhatsApp Order Button (Mobile-First) -->
<div class="wa-order-container">
  <!-- Sticky Bottom Button -->
  @if (!showForm()) {
    <button
      class="wa-order-btn"
      [class.wa-btn-disabled]="isEmpty()"
      [class.wa-btn-loading]="submitting()"
      (click)="openForm()"
      [disabled]="isEmpty() || submitting()"
    >
      <!-- WhatsApp Icon -->
      <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>

      <!-- Text & Total -->
      <div class="wa-btn-content">
        <span class="wa-btn-label">Commander via WhatsApp</span>
        <div class="wa-btn-meta">
          @if (itemCount() > 0) {
            <span class="wa-item-count">{{ itemCount() }} article{{ itemCount() > 1 ? 's' : '' }}</span>
            <span class="wa-total">{{ fmt(total()) }}</span>
          } @else {
            <span class="wa-empty">Panier vide</span>
          }
        </div>
      </div>

      <!-- Loading Spinner -->
      @if (submitting()) {
        <mat-spinner diameter="20" strokeWidth="3" class="wa-spinner" />
      }
    </button>
  }

  <!-- Inline Customer Form (Slide-up) -->
  @if (showForm()) {
    <div class="wa-order-form">
      <div class="form-header">
        <svg class="wa-icon-small" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>Vos coordonnées</span>
        <button class="form-close" (click)="closeForm()">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>

      <!-- Name Input -->
      <label class="field-label">Nom complet *</label>
      <div class="input-wrap" [class.input-filled]="customerName().length > 0">
        <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <input
          type="text"
          class="form-input"
          placeholder="Ex : Aminata Traoré"
          autocomplete="name"
          inputmode="text"
          [value]="customerName()"
          (input)="customerName.set($any($event.target).value)"
        />
      </div>

      <!-- Phone Input -->
      <label class="field-label">Numéro WhatsApp *</label>
      <app-phone-input
        [ngModel]="customerPhone()"
        (ngModelChange)="customerPhone.set($event)"
        (countryCodeChange)="countryCode.set($event)">
      </app-phone-input>
      @if (customerPhone().length > 0 && !isPhoneValid) {
        <span class="phone-error">Numéro invalide pour le pays sélectionné</span>
      }

      <!-- Note Input (Optional) -->
      <label class="field-label">Note (optionnel)</label>
      <div class="input-wrap" [class.input-filled]="customerNote().length > 0">
        <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
        <input
          type="text"
          class="form-input"
          placeholder="Livraison, adresse, heure…"
          [value]="customerNote()"
          (input)="customerNote.set($any($event.target).value)"
        />
      </div>

      <!-- Error Banner -->
      @if (submitError()) {
        <div class="form-error">
          <svg class="error-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
          {{ submitError() }} — WhatsApp s'ouvrira quand même.
        </div>
      }

      <!-- Submit Button -->
      <button
        class="confirm-btn"
        (click)="submitOrder()"
        [disabled]="!formValid || submitting()"
      >
        @if (submitting()) {
          <mat-spinner diameter="20" strokeWidth="3" />
          <span>Envoi en cours…</span>
        } @else {
          <svg class="wa-icon-small" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          <span>Confirmer &amp; ouvrir WhatsApp — {{ fmt(total()) }}</span>
        }
      </button>

      <p class="form-hint">
        <svg class="hint-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
        Vos données ne sont utilisées que pour traiter votre commande.
      </p>
    </div>
  }
</div>
